<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>snails</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            font-family: sans-serif;
        }
        .slider img {
            width: 700px;
            height: 640px;
            object-fit: cover;
            display: block;
            margin-bottom: 20px;
            border: 2px solid #000;
        }
        .buttons {
            display: flex;
            gap: 40px;
            justify-content: center;
        }
        .buttons button {
            font-size: 28px;
            padding: 10px 35px;
            border: 2px solid #000;
            border-radius: 0px;
            cursor: pointer;
            background: #FFFFFF;
            color: black;
        }
        .buttons button:hover {
            border: 4px solid #000;
        }
        .buttons button:active {
            transform: translateY(2px);

        }
    </style>
</head>
<body>

<div class="slider">
    <img id="slide" src="1.jpg"image">
    <div class="buttons">
        <button id="prev">« back</button>
        <button id="next">next »</button>
    </div>
</div>

<script>

    const images = [
        '1.jpg',
        '2.jpg',
        '3.jpg',
        '4.jpg',
        '5.jpg',
        '6.jpg',
        '7.jpg',
        '8.jpg',
        '9.jpg',
        '10.jpg',
        '11.jpg',
        '12.jpg',
        '13.jpg',
        '14.jpg',
        '15.jpg',
        '16.jpg',
        '17.jpg',
        '18.jpg'
    ];

    let current = 0;
    const img = document.getElementById('slide');

    document.getElementById('prev').onclick = () => {
        current = (current - 1 + images.length) % images.length;
        img.src = images[current];
    };

    document.getElementById('next').onclick = () => {
        current = (current + 1) % images.length;
        img.src = images[current];
    };
</script>

</body>
</html>
